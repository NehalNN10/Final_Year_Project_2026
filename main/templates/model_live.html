<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

    <title>HU Digital Twin - Live Model</title>

    <script src="https://cdn.socket.io/4.5.4/socket.io.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "jsm/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>

    <script type="text/javascript" src="{{ url_for('static', filename='dat.gui.min.js') }}"></script>
  </head>

  <body>
    <div class="main-nav">
      <div style="flex: 1;">
        <h1>HU Digital Twin - LIVE</h1>
      </div>
      <div style="flex: 2;"> 
        <div style="display: flex; flex-direction: row; justify-content: space-evenly">
          <button class="header" onclick="window.location.href='/dashboard'">Home</button>
          <button class="header selected" onclick="window.location.href='/model'">Model</button>
          <button class="header" onclick="window.location.href='/'">Log Out</button>
        </div>
      </div>
    </div>

    <div class="main">
      <div id="model-container">
        <div class="crosshair"></div>
      </div> 
      
      <div class="scroll" id="float">
        <div class="tracker-ui outer" style="margin-top: 20px;">
          <h3 class="row">
            <span id="ui-room-name">Select a person</span>
          </h3>
          
          <div class="content" id="ui-content">
            <div class="row">
              <span>Room ID: <strong id="ui-room-id">N/A</strong></span>
            </div>
            <div class="row">
              <span>Floor: <strong id="ui-room-floor">N/A</strong></span>
            </div>
            <div class="row border">
              <span>Live Occupancy: <strong id="ui-occupancy">0 people</strong></span>
            </div>
            <div class="row">
              <span>Time: <strong id="ui-iot-time">--:--:--</strong></span>
            </div>
          </div>
        </div>
        
        <div style="display: none">
          <span id="department">{{ department }}</span>
          <span id="live">true</span>
        </div>
      </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='live_model.js') }}"></script>
  </body>
</html>
